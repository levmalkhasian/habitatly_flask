<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Los Angeles skyline style illustration</title>
  <desc id="desc">Warm sunset sky with downtown skyline silhouette and palm trees.</desc>
  <defs>
    <linearGradient id="sky" x1="600" y1="0" x2="600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9A15B"/>
      <stop offset="0.45" stop-color="#F77EA7"/>
      <stop offset="1" stop-color="#6E7AE8"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="420" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9CC5E5" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#101828" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="ground" x1="600" y1="560" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B1F3B"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>
