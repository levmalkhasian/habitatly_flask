<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habitatly</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="{{ url_for('index') }}" aria-label="Habitatly home">
        <span>Habitatly 🏡</span>
      </a>
    </div>
  </header>

  <main class="page">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-brand">Habitatly</p>
      <p class="footer-copy">Simple city matching for real-world priorities.</p>
    </div>
  </footer>
</body>
</html>
